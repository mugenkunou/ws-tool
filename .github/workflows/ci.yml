name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Format check
        run: |
          mkdir -p tmp
          gofmt -l . | tee tmp/fmt.out
          test ! -s tmp/fmt.out

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -ldflags "-s -w" -o ws .
